<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>十二の会 - The Twelve Society</title>
  <link rel="icon" type="image/svg+xml" href="https://drive.proton.me/urls/DYDQ5C6B1M#WgOtprWxzDS3" />
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      background:
        radial-gradient(circle at 50% 18%, rgba(42, 68, 122, 0.18), transparent 30%),
        radial-gradient(circle at 50% 50%, rgba(8, 14, 28, 0.56), transparent 42%),
        linear-gradient(180deg, #02050b 0%, #07101c 52%, #0b1626 100%);
      color: #f3f3f6;
      font-family: "Helvetica Neue", Arial, sans-serif;
      text-align: center;
      padding: 24px;
    }

    body::before,
    body::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(80px);
      opacity: 0.12;
      animation: drift 18s ease-in-out infinite alternate;
    }

    body::before {
      width: 360px;
      height: 360px;
      top: 8%;
      left: 10%;
      background: rgba(46, 78, 144, 0.2);
    }

    body::after {
      width: 420px;
      height: 420px;
      right: 8%;
      bottom: 6%;
      background: rgba(58, 10, 16, 0.18);
      animation-duration: 22s;
    }

    .vignette,
    .vignette::before {
      background: radial-gradient(circle at center, rgba(8, 18, 34, 0.48) 0%, rgba(8, 18, 34, 0.2) 22%, transparent 44%);
      transform: scale(0.88);
      animation: coreThrob 12s ease-in-out infinite;
    }

    .vignette {
      background: radial-gradient(circle at center, transparent 0%, rgba(0, 0, 0, 0.2) 58%, rgba(0, 0, 0, 0.52) 100%);
    }

    .vignette::before {
      background: radial-gradient(circle at center, rgba(10, 10, 14, 0.44) 0%, rgba(10, 10, 14, 0.18) 22%, transparent 44%);
      transform: scale(0.88);
      animation: coreThrob 12s ease-in-out infinite;
    }

    .seal {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 430px;
      height: 430px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      opacity: 0.05;
      pointer-events: none;
      z-index: 1;
      background:
        radial-gradient(circle, transparent 60%, rgba(170, 145, 240, 0.1) 61%, transparent 62.5%),
        radial-gradient(circle, transparent 70%, rgba(170, 145, 240, 0.08) 71%, transparent 72.5%);
      animation: rotateSeal 90s linear infinite;
    }

    .seal::before,
    .seal::after {
      background: radial-gradient(circle, rgba(90, 10, 10, 0.18) 0%, rgba(10, 10, 12, 0.14) 24%, transparent 46%);
      filter: blur(20px);
      opacity: 0.1;
      animation: emberHold 12s ease-in-out infinite;
    }

    .seal::before {
      background: repeating-conic-gradient(
        from 0deg,
        rgba(145, 18, 18, 0.16) 0deg,
        rgba(145, 18, 18, 0.16) 7deg,
        transparent 7deg,
        transparent 30deg
      );
      -webkit-mask: radial-gradient(circle, transparent 64%, #fff 65%, #fff 66%, transparent 67%);
      mask: radial-gradient(circle, transparent 64%, #fff 65%, #fff 66%, transparent 67%);
      opacity: 0.02;
      animation: sealTighten 12s ease-in-out infinite;
    }

    .seal::after {
      background: radial-gradient(circle, rgba(90, 10, 10, 0.12) 0%, transparent 46%);
      filter: blur(18px);
      opacity: 0.08;
      animation: emberHold 12s ease-in-out infinite;
    }

        .background-shimmer,
    .background-shimmer::before,
    .background-shimmer::after {
      position: absolute;
      inset: 0;
      content: "";
      pointer-events: none;
    }

    .background-shimmer {
      background:
        linear-gradient(115deg, transparent 0%, rgba(110, 150, 230, 0.03) 32%, transparent 58%),
        linear-gradient(245deg, transparent 0%, rgba(140, 35, 35, 0.025) 38%, transparent 70%);
      opacity: 0.7;
      animation: shimmerSweep 18s ease-in-out infinite;
    }

    .background-shimmer::before {
      background: radial-gradient(circle at 30% 40%, rgba(120, 165, 255, 0.04) 0%, transparent 18%);
      filter: blur(22px);
      animation: floatMist 20s ease-in-out infinite alternate;
    }

    .background-shimmer::after {
      background: radial-gradient(circle at 68% 62%, rgba(150, 20, 20, 0.03) 0%, transparent 20%);
      filter: blur(26px);
      animation: floatMist 24s ease-in-out infinite alternate-reverse;
    }

    main {
      position: relative;
      z-index: 2;
      max-width: 720px;
      padding: 40px 28px;
    }

    .jp-wrap {
      position: relative;
      display: inline-block;
      padding: 10px 18px;
    }

    .jp-wrap::before {
      content: "";
      position: absolute;
      inset: -20px -28px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(8, 8, 12, 0.52) 0%, rgba(8, 8, 12, 0.24) 32%, transparent 68%);
      filter: blur(10px);
      opacity: 0.9;
      animation: voidBreathe 12s ease-in-out infinite;
      z-index: -1;
    }

    .jp {
      margin: 0;
      font-size: clamp(3rem, 10vw, 6rem);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: 0.08em;
      color: #f5f3f8;
      text-shadow: 0 0 14px rgba(176, 150, 245, 0.1), 0 0 34px rgba(0, 0, 0, 0.9), 0 0 22px rgba(120, 20, 20, 0.12);
      animation: containPulse 12s ease-in-out infinite;
      will-change: transform, text-shadow, opacity, filter;
    }

    .en {
      margin-top: 18px;
      font-size: clamp(1rem, 2.5vw, 1.45rem);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #cbcad3;
      opacity: 0.84;
    }

    @keyframes drift {
      0% {
        transform: translate3d(0, 0, 0) scale(1);
        opacity: 0.08;
      }
      50% {
        opacity: 0.14;
      }
      100% {
        transform: translate3d(24px, -18px, 0) scale(1.05);
        opacity: 0.11;
      }
    }

    @keyframes rotateSeal {
      from {
        transform: translate(-50%, -50%) rotate(0deg);
      }
      to {
        transform: translate(-50%, -50%) rotate(360deg);
      }
    }

    @keyframes coreThrob {
      0%, 100% {
        opacity: 0.55;
        transform: scale(0.88);
      }
      50% {
        opacity: 0.68;
        transform: scale(0.865);
      }
    }

    @keyframes voidBreathe {
      0%, 100% {
        transform: scale(1);
        opacity: 0.88;
      }
      50% {
        transform: scale(0.985);
        opacity: 0.98;
      }
    }

    @keyframes containPulse {
      0%, 90%, 100% {
        transform: scale(1);
        opacity: 0.96;
        filter: blur(0);
        text-shadow: 0 0 14px rgba(176, 150, 245, 0.1), 0 0 34px rgba(0, 0, 0, 0.9);
      }
      93% {
        transform: scale(0.992);
        opacity: 1;
        text-shadow: 0 0 18px rgba(176, 150, 245, 0.16), 0 0 40px rgba(0, 0, 0, 0.95);
      }
      96% {
        transform: scale(0.984);
        opacity: 1;
        filter: blur(0.2px);
        text-shadow: 0 0 16px rgba(190, 40, 40, 0.24), 0 0 44px rgba(80, 10, 10, 0.46), 0 0 60px rgba(0, 0, 0, 0.96);
      }
      98% {
        transform: scale(0.995);
        opacity: 0.98;
        filter: blur(0);
        text-shadow: 0 0 15px rgba(176, 150, 245, 0.12), 0 0 36px rgba(0, 0, 0, 0.92);
      }
    }

    @keyframes sealTighten {
      0%, 90%, 100% {
        opacity: 0.018;
        transform: scale(1);
      }
      94% {
        opacity: 0.032;
        transform: scale(0.996);
      }
      96% {
        opacity: 0.07;
        transform: scale(0.988);
      }
      98% {
        opacity: 0.024;
        transform: scale(0.997);
      }
    }

    @keyframes emberHold {
      0%, 90%, 100% {
        opacity: 0.06;
      }
      96% {
        opacity: 0.16;
      }
    }

    @keyframes shimmerSweep {
      0%, 100% {
        transform: translate3d(-1.5%, 0, 0);
        opacity: 0.45;
      }
      50% {
        transform: translate3d(1.5%, -1%, 0);
        opacity: 0.72;
      }
    }

    @keyframes floatMist {
      0% {
        transform: translate3d(0, 0, 0) scale(1);
        opacity: 0.3;
      }
      100% {
        transform: translate3d(18px, -14px, 0) scale(1.06);
        opacity: 0.5;
      }
    }
  </style>
</head>
<body>
  <div class="vignette"></div>
  <div class="background-shimmer"></div>
  <div class="seal"></div>

  <main>
    <div class="jp-wrap">
      <h1 class="jp">十二の会</h1>
    </div>
    <div class="en">The Twelve Society</div>
  </main>
</body>
</html>
